name: CI

# Bootstrap updates this workflow when it provisions a non-Node stack — but the harness
# linter is npm-delivered, so even a non-Node stack must keep a minimal Node toolchain,
# the pinned `@andrew-semyonov/harness-linter` devDependency, and the `npx harnesslint`
# step that `make ci` runs (see docs/bootstrap/blessed-stacks.md, F5).

# Run on every PR, but only on pushes to `main` — a feature-branch push while its
# exec-plan is still in `active/` would otherwise red `lint-harness` on
# `exec-plan-active-present`. The plan is closed before the PR, so the PR run is clean.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 11.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: pnpm

      # Install (with the committed lockfile) BEFORE any target that calls `npx harnesslint`,
      # which resolves the bin from node_modules/.bin.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `make ci` = fmt-check + lint + test + build + lint-harness. CI runs against the PR,
      # where the active exec-plan is already closed, so `exec-plan-active-present` does not fire.
      - name: Run full gate
        run: make ci

  # Template-maintenance ONLY. The distribution artifact must ship with empty lifecycle dirs.
  # Repo-gated so it NEVER runs in a cloned product repo (which is supposed to accumulate
  # completed plans/reports). The github.repository gate is the safety; the bootstrap strip
  # (docs/bootstrap/cold-start.md step 8) is optional hygiene, not a dependency.
  clean-state:
    if: github.repository == 'experiments-with-ai/harness-template'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Lifecycle dirs must be .gitkeep-only
        run: |
          stray="$(find docs/exec-plans/active docs/exec-plans/completed \
                        docs/review/reports/active docs/review/reports/closed \
                        -type f ! -name .gitkeep)"
          if [ -n "$stray" ]; then
            echo "::error::Distribution state not clean — these must not be on main:"
            echo "$stray"
            echo "Run 'make clean-lifecycle' before merging (template maintenance only)."
            exit 1
          fi
      # §1.2 tripwire. The harness linter checks links / pairing / exec-plan-lifecycle, not prose
      # semantics, and these are inline-prose (not link) references, so brokenLinks can't catch a
      # reintroduced contradiction. This coarse grep can: it fails if cold-start.md describes an
      # active exec-plan as EXISTING at genesis (the model §1.2 removed). Verified to fire on the
      # pre-edit wording and pass the cleaned one (the wrapped step-9 "no active exec-plan" is
      # allow-listed; newline-normalization makes the match whitespace-robust).
      - name: cold-start.md asserts no active exec-plan at genesis (plan §1.2)
        run: |
          # Normalize newlines to spaces so a markdown hard-wrap can't hide a split phrase; scan the
          # period-bounded window around each "active exec-plan" and allow the post-genesis /
          # "no exec-plan" phrasings. Coarse tripwire, not a parser — it catches a reintroduced
          # positive assertion that genesis carries an active plan.
          if tr '\n' ' ' < docs/bootstrap/cold-start.md \
             | grep -oE "[^.]*active exec-plan[^.]*" \
             | grep -viE "post-genesis|post-handoff|no (active )?exec-plan"; then
            echo "::error::cold-start.md describes an active exec-plan at genesis (see plan §1.2)"
            exit 1
          fi
